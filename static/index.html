<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #111; margin: 0; padding: 60px 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; width: 100%; }
        
        /* Clean Header */
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        /* Input Row */
        .input-row { display: flex; gap: 12px; margin-bottom: 60px; flex-wrap: wrap; }
        input { border: 1px solid #ddd; padding: 10px 14px; border-radius: 4px; font-size: 14px; flex: 1; min-width: 180px; outline: none; }
        input:focus { border-color: #000; }
        button { background: #000; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 14px; }
        button:hover { background: #333; }
        button:disabled { background: #eaeaea; color: #999; cursor: not-allowed; }

        /* Output Structure */
        .results-area { 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            width: 100%; 
        }
        .section { 
            border-top: 1px solid #f0f0f0; 
            padding-top: 20px; 
            width: 100%; 
        }
        .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #888; letter-spacing: 0.1em; margin-bottom: 12px; display: block; }
        
        .content { 
            font-size: 15px; 
            color: #333; 
            white-space: normal; 
            word-wrap: break-word; 
            display: block; 
            width: 100%; 
        }
        
        /* Internal Text Formatting */
        .content b { color: #000; display: block; margin-top: 10px; }
        .content br { margin-bottom: 8px; }
        
        #loading { display: none; font-size: 14px; color: #888; margin-bottom: 20px; font-style: italic; }
        .calendar-link { display: inline-block; margin-top: 30px; color: #000; font-weight: 700; text-decoration: none; border: 1px solid #000; padding: 10px 20px; border-radius: 4px; font-size: 13px; }
        .calendar-link:hover { background: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interview Orchestrator</h1>

        <div class="input-row">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="role" placeholder="Target Role">
            <input type="date" id="date">
            <button onclick="execute()" id="btn">Run Analysis</button>
        </div>

        <div id="loading">Processing research data...</div>
        <div class="results-area" id="output"></div>
    </div>

    <script>
        async function execute() {
            const btn = document.getElementById('btn');
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');
            
            const payload = {
                company_name: document.getElementById('company').value,
                target_role: document.getElementById('role').value,
                interview_date: document.getElementById('date').value
            };

            if(!payload.company_name || !payload.interview_date) return;

            btn.disabled = true;
            loading.style.display = "block";
            output.innerHTML = "";

            try {
                const response = await fetch('/research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                // Render Insights
                if (data.insights) {
                    Object.entries(data.insights).forEach(([agent, text]) => {
                        const formatted = text
                            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                            .replace(/\n/g, '<br>');

                        output.innerHTML += `
                            <div class="section">
                                <span class="section-label">${agent.replace('_', ' ')}</span>
                                <div class="content">${formatted}</div>
                            </div>
                        `;
                    });
                }

                // Add Calendar Link with improved URL extraction
                if(data.mcp_log && data.mcp_log.includes("http")) {
                    const urlMatch = data.mcp_log.match(/https?:\/\/[^\s]+/);
                    if (urlMatch) {
                        output.innerHTML += `<div><a href="${urlMatch[0]}" target="_blank" class="calendar-link">Add to Calendar</a></div>`;
                    }
                }
            } catch (e) {
                output.innerHTML = "Error retrieving research.";
            }
            btn.disabled = false;
            loading.style.display = "none";
        }
    </script>
</body>
</html>
